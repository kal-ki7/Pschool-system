<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የመግቢያ ገጽ - ትምህርት ቤት</title>
</head>
<body>
    <h2>ወደ ሲስተሙ ይግቡ</h2>
    <form action="/login" method="POST">
        <label>ተጠቃሚ ስም:</label><br>
        <input type="text" name="username" required><br><br>
        
        <label>የይለፍ ቃል:</label><br>
        <input type="password" name="password" required><br><br>
        
        <button type="submit">ግባ</button>
    </form>
</body>
</html>
